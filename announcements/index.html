    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const qs = sel => document.querySelector(sel);
        fetch('../data/announcements.json')
          .then(response => response.json())
          .then(data => {
            const announcements = data.announcements.sort(
              (a, b) => new Date(b.date) - new Date(a.date)
            );
            const container = qs('#announcements-list');
            container.innerHTML = announcements
              .map(announcement => {
                const date = new Date(announcement.date);
                const formattedDate =
                  date.getFullYear() + '年' + (date.getMonth() + 1) + '月' + date.getDate() + '日';
                return `
                    <a href="detail.html?id=${announcement.id}" class="card mb-3 text-decoration-none text-reset">
                        <div class="card-body">
                            <div class="d-flex w-100 justify-content-between mb-2">
                                <h5 class="mb-0">${announcement.title}</h5>
                                <small class="text-muted">${formattedDate}</small>
                            </div>
                            <p class="mb-2">${announcement.excerpt}</p>
                            <small class="text-muted"><i class="iconfont icon-chakan"></i> ${announcement.views.toLocaleString()} 浏览</small>
                        </div>
                    </a>
                `;
              })
              .join('');
            qs('#skeleton-loading').classList.add('skeleton-hidden');
            qs('#announcements-container').classList.remove('skeleton-hidden');
          })
          .catch(() => {
            qs('#skeleton-loading').classList.add('skeleton-hidden');
            qs('#announcements-container').classList.remove('skeleton-hidden');
            qs('#announcements-list').innerHTML =
              '<div class="alert alert-danger">加载公告失败,请刷新页面重试。</div>';
          });
      });
    </script>
