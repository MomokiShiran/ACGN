    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const urlParams = new URLSearchParams(window.location.search);
        const announcementId = parseInt(urlParams.get('id'));

        const qs = sel => document.querySelector(sel);

        if (!announcementId) {
          showError('未找到公告ID');
          return;
        }

        fetch('../data/announcements.json')
          .then(response => response.json())
          .then(data => {
            const announcement = data.announcements.find(a => a.id === announcementId);

            if (!announcement) {
              showError('未找到该公告');
              return;
            }

            const date = new Date(announcement.date);
            const now = new Date();
            const yearsDiff = Math.floor((now - date) / (365.25 * 24 * 60 * 60 * 1000));
            const timeAgo = yearsDiff > 0 ? yearsDiff + '年前' : '今年';
            const formattedDate =
              date.getFullYear() + '年' + (date.getMonth() + 1) + '月' + date.getDate() + '日';

            document.title = announcement.title + ' | MyACGN';
            qs('#announcement-title').textContent = announcement.title;

            qs('#announcement-meta').innerHTML = `
                <span class="me-3 d-none d-sm-block"><i class="iconfont icon-time"></i> ${timeAgo} (${formattedDate})</span>
                <span class="me-3"><i class="iconfont icon-user-circle"></i> ${announcement.author}</span>
                <span class="views me-3"><i class="iconfont icon-chakan"></i> ${announcement.views.toLocaleString()}</span>
                <span class="me-3"><a class="" href="#comments"> <i class="iconfont icon-comment"></i> ${announcement.comments}</a></span>
                <span class="me-3"><a class="btn-like btn-link-like" href="javascript:;" post_like data-id="${announcement.id}"><i class="iconfont icon-like"></i> <span class="like-count">${announcement.likes}</span></a></span>
            `;

            qs('#announcement-content').innerHTML = announcement.content;

            qs('#skeleton-loading').classList.add('skeleton-hidden');
            qs('#announcement-container').classList.remove('skeleton-hidden');
          })
          .catch(() => {
            qs('#skeleton-loading').classList.add('skeleton-hidden');
            qs('#announcement-container').classList.remove('skeleton-hidden');
            showError('加载公告失败，请刷新页面重试。');
          });

        function showError(message) {
          qs('#announcement-title').textContent = '错误';
          qs('#announcement-meta').innerHTML = '';
          qs('#announcement-content').innerHTML =
            `<div class="alert alert-danger">${message}</div><a href="index.html" class="btn btn-primary">返回公告列表</a>`;
        }
      });
    </script>
