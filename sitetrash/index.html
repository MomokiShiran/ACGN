    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const SITES_JSON = '../data/sitetrash.json';
        const qs = sel => document.querySelector(sel);

        function renderSiteCard(site) {
          // 使用自定义icon或fallback到默认
          const faviconUrl = site.icon 
          ? site.icon.replace(/^\/?/, '/') 
          : '/assets/images/favicon.png';
          const detailUrl = `../sites/detail.html?id=${site.id}`;
          const togoUrl = site.url || '#';

          return `
            <div class="url-card col-6 col-sm-4 col-md-3 col-lg-2">
                <div class="url-body default">
                    <a href="${detailUrl}" target="_blank" data-id="${site.id}" class="card no-c mb-4" data-bs-toggle="tooltip" data-bs-placement="bottom" title="${site.description}">
                        <div class="card-body">
                            <div class="url-content d-flex align-items-center">
                                <div class="url-img rounded-circle me-2 d-flex align-items-center justify-content-center">
                                    <img loading="lazy" src="${faviconUrl}" onerror="this.src='/assets/images/favicon.png'">
                                </div>
                                <div class="url-info flex-fill">
                                    <div class="text-sm overflowClip_1"><strong>${site.name}</strong></div>
                                    <p class="overflowClip_1 m-0 text-muted text-xs">${site.description}</p>
                                </div>
                            </div>
                        </div>
                    </a>
                    <a href="${togoUrl}" class="togo text-center text-muted" target="_blank" data-bs-toggle="tooltip" data-bs-placement="right" title="直达"><i class="iconfont icon-goto"></i></a>
                </div>
            </div>
        `;
        }

        function renderSites(data) {
          const container = qs('#sites-list');
          container.innerHTML = '';

          let html = '';
          data.categories.forEach(category => {
            // 处理顶级分类的网站
            if (category.sites && category.sites.length > 0) {
              category.sites.forEach(site => {
                html += renderSiteCard(site);
              });
            }
            // 处理二级分类的网站
            if (category.children && category.children.length > 0) {
              category.children.forEach(subCategory => {
                if (subCategory.sites && subCategory.sites.length > 0) {
                  subCategory.sites.forEach(site => {
                    html += renderSiteCard(site);
                  });
                }
              });
            }
          });
          container.innerHTML = html;
        }

        function loadSites() {
          const skeletonContainer = qs('#skeleton-loading');
          const sitesContainer = qs('#sites-container');

          fetch(SITES_JSON)
            .then(response => response.json())
            .then(data => {
              renderSites(data);
              skeletonContainer.classList.add('skeleton-hidden');
              sitesContainer.classList.remove('skeleton-hidden');
            })
            .catch(() => {
              console.error('Failed to load sites data');
              skeletonContainer.classList.add('skeleton-hidden');
              sitesContainer.classList.remove('skeleton-hidden');
            });
        }

        loadSites();
      });
    </script>
